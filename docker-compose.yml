services:
  postgres:
    image: postgres:16-alpine
    container_name: subtrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: subtrack_user
      POSTGRES_PASSWORD: subtrack_dev_password
      POSTGRES_DB: subtrack_db
    ports:
      - '5432:5432'
    volumes:
      - subtrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U subtrack_user -d subtrack_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - subtrack-network

  adminer:
    image: adminer:4-standalone
    container_name: subtrack-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: dracula
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - subtrack-network

volumes:
  subtrack_postgres_data:
    name: subtrack_postgres_data

networks:
  subtrack-network:
    name: subtrack-network
    driver: bridge
